<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dan's Recipes</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-title">Dan's Recipes</a>
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search-input" type="search" placeholder="Search recipes…" autocomplete="off" />
    </div>
    <div class="header-controls">
      <span class="zoom-label">Zoom</span>
      <input id="zoom-slider" type="range" min="0.8" max="1.4" step="0.05" value="1" />
      <div class="login-bar">
        <span id="login-status"></span>
        <button id="login-btn" class="btn-small">Login</button>
      </div>
    </div>
  </div>
</header>

<nav class="category-nav">
  <div class="category-nav-inner">
    <button class="cat-tab active" data-cat="All">All</button>
  </div>
</nav>

<div class="main-content">
  <div class="admin-bar" id="admin-bar" style="display:none">
    <button class="btn-add" id="add-recipe-btn">&#xFF0B; Add Recipe</button>
  </div>
  <div id="tag-bar"></div>
  <p class="results-count" id="results-count"></p>
  <div id="recipe-grid"></div>

  <!-- Sourdough log section (shown when Sourdough tab active) -->
  <div id="sourdough-section" style="display:none">
    <div class="sub-tab-bar">
      <button class="sub-tab active" data-view="recipes" id="sub-recipes">Recipes</button>
      <button class="sub-tab" data-view="log" id="sub-log">Bake Log</button>
    </div>
    <div id="log-section" style="display:none">
      <div id="add-log-area"></div>
      <div id="log-table-wrap"></div>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div id="login-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h2 class="modal-title">Login</h2>
    <div id="login-error" class="form-error" style="display:none"></div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" class="form-input" placeholder="Password" />
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="login-submit">Login</button>
      <button class="btn-secondary" id="login-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Add Recipe Modal -->
<div id="add-recipe-modal" class="modal-overlay" style="display:none">
  <div class="modal-box modal-wide">
    <h2 class="modal-title">Add Recipe</h2>
    <div class="form-group">
      <label>Title *</label>
      <input type="text" id="nr-title" class="form-input" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category *</label>
        <input type="text" id="nr-category" class="form-input" />
      </div>
      <div class="form-group">
        <label>Yield</label>
        <input type="text" id="nr-yield" class="form-input" />
      </div>
    </div>
    <div class="form-group">
      <label>Tags (comma separated)</label>
      <input type="text" id="nr-tags" class="form-input" />
    </div>
    <div class="form-group">
      <label>Image URL</label>
      <input type="text" id="nr-image" class="form-input" />
    </div>
    <div class="form-group">
      <label>Ingredients (one per line, use "# Section Name" for subsections)</label>
      <textarea id="nr-ingredients" class="form-textarea" rows="6"></textarea>
    </div>
    <div class="form-group">
      <label>Instructions</label>
      <textarea id="nr-instructions" class="form-textarea" rows="5"></textarea>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="nr-notes" class="form-textarea" rows="2"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="nr-submit">Save Recipe</button>
      <button class="btn-secondary" id="nr-cancel">Cancel</button>
    </div>
  </div>
</div>

<script src="/js/fuse.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
