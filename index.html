<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dan's Recipes</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-title">Dan's Recipes</a>
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search-input" type="search" placeholder="Search recipes…" autocomplete="off" />
    </div>
    <div class="header-controls">
      <span class="zoom-label">Zoom</span>
      <input id="zoom-slider" type="range" min="0.8" max="1.4" step="0.05" value="1" />
      <div class="auth-slot"></div>
    </div>
  </div>
</header>

<nav class="category-nav">
  <div class="category-nav-inner">
    <button class="cat-tab active" data-cat="All">All</button>
  </div>
</nav>

<!-- Sourdough sub-tabs (hidden unless Sourdough is active) -->
<div id="sourdough-subtabs" class="sourdough-subtabs" style="display:none">
  <button class="subtab-btn active" id="subtab-recipes" onclick="showRecipesSubtab()">Recipes</button>
  <button class="subtab-btn" id="subtab-log" onclick="showLogSubtab()">Bake Log</button>
</div>

<div class="main-content">
  <div id="tag-bar"></div>
  <div class="results-toolbar">
    <p class="results-count" id="results-count"></p>
    <div class="results-actions">
      <button class="filter-btn" id="never-made-btn" onclick="toggleNeverMade()">Never Made</button>
      <a href="/recipe/new" class="btn-new-recipe auth-only" style="display:none">+ New Recipe</a>
      <button class="filter-btn auth-only" style="display:none" onclick="showTagManager()">Tags</button>
    </div>
  </div>
  <div id="recipe-grid"></div>
  <div id="log-section" style="display:none"></div>
</div>

<script src="/js/fuse.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
