<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dan's Recipes</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-title">Dan's Recipes</a>
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search-input" type="search" placeholder="Search recipes…" autocomplete="off" />
    </div>
    <div class="header-controls">
      <span class="zoom-label">Zoom</span>
      <input id="zoom-slider" type="range" min="0.8" max="1.4" step="0.05" value="1" />
      <div id="login-bar" class="login-bar"></div>
    </div>
  </div>
</header>

<nav class="category-nav">
  <div class="category-nav-inner">
    <button class="cat-tab active" data-cat="All">All</button>
  </div>
</nav>

<!-- Sourdough sub-tabs (hidden unless Sourdough is active) -->
<div id="sourdough-subtabs" class="sourdough-subtabs" style="display:none">
  <button class="subtab-btn active" id="subtab-recipes" onclick="showRecipesSubtab()">Recipes</button>
  <button class="subtab-btn" id="subtab-log" onclick="showLogSubtab()">Bake Log</button>
</div>

<div class="main-content">
  <div id="tag-bar"></div>
  <p class="results-count" id="results-count"></p>
  <div id="recipe-grid"></div>
  <!-- Sourdough log (hidden by default) -->
  <div id="log-section" style="display:none"></div>
</div>

<!-- Login modal -->
<div id="login-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)hideLoginModal()">
  <div class="modal-box">
    <h3>Edit Mode</h3>
    <input id="login-pwd" type="password" placeholder="Password" class="modal-input"
      onkeydown="if(event.key==='Enter')doLogin()" />
    <p id="login-error" class="modal-error"></p>
    <div class="modal-btns">
      <button class="save-btn" onclick="doLogin()">Log in</button>
      <button class="cancel-btn" onclick="hideLoginModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="/js/fuse.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
