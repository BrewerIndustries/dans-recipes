<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe — Dan's Recipes</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="recipe-page-header">
  <a href="/" class="back-btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    All Recipes
  </a>
  <div class="header-controls" style="margin-left:auto;display:flex;align-items:center;gap:0.75rem;">
    <span class="zoom-label">Zoom</span>
    <input id="zoom-slider" type="range" min="0.8" max="1.4" step="0.05" value="1" />
    <button class="print-btn" onclick="window.print()">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
      </svg>
      Print
    </button>
    <button id="edit-btn" class="edit-btn" style="display:none">&#x270F;&#xFE0F; Edit</button>
    <button id="save-btn" class="btn-primary" style="display:none">Save</button>
    <button id="cancel-btn" class="btn-secondary" style="display:none">Cancel</button>
    <button id="delete-btn" class="btn-danger" style="display:none">Delete</button>
  </div>
</header>

<div class="recipe-detail">
  <div id="recipe-content" class="recipe-detail-inner">
    <p style="color:var(--color-muted);text-align:center;padding:3rem;">Loading&hellip;</p>
  </div>
</div>

<script src="/js/recipe.js"></script>
</body>
</html>
